name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile
        run: npm run compile

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Test
        run: npm test

      # Upload compiled output from Node 22 run for downstream jobs
      - name: Upload compiled output
        if: matrix.node-version == 22
        uses: actions/upload-artifact@v4
        with:
          name: compiled-output
          retention-days: 1
          path: |
            packages/ecl-core/src/parser/generated/
            packages/ecl-core/dist/
            packages/ecl-lsp-server/dist/
            packages/ecl-mcp-server/dist/
            packages/ecl-editor-core/dist/
            packages/ecl-editor-react/dist/
            packages/ecl-editor/dist/
            clients/vscode/dist/

  security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Dependency vulnerability scan (npm + Gradle lockfiles)
      - name: Trivy dependency scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scanners: vuln
          severity: CRITICAL,HIGH
          exit-code: 1

      # Secret scanning (leaked keys, tokens, passwords)
      - name: Trivy secret scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scanners: secret
          exit-code: 1

      # License compliance (Apache 2.0 — block copyleft)
      - name: Trivy license scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scanners: license
          severity: CRITICAL,HIGH
          exit-code: 1
          trivy-config: trivy.yaml

      # SAST — static analysis for code-level vulnerabilities
      - name: Semgrep SAST
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/javascript
            p/typescript
            p/owasp-top-ten
            p/security-audit

  licenses:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check THIRD-PARTY-LICENSES.txt is up to date
        run: npm run licenses:check

  e2e-tests:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download compiled output
        uses: actions/download-artifact@v4
        with:
          name: compiled-output

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e

  intellij-plugin:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download compiled output
        uses: actions/download-artifact@v4
        with:
          name: compiled-output

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build and test IntelliJ plugin
        working-directory: clients/intellij
        run: ./gradlew build

      - name: Upload IntelliJ plugin
        uses: actions/upload-artifact@v4
        with:
          name: intellij-plugin
          path: clients/intellij/build/distributions/*.zip

  eclipse-plugin:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download compiled output
        uses: actions/download-artifact@v4
        with:
          name: compiled-output

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ hashFiles('clients/eclipse/**/pom.xml', 'clients/eclipse/**/*.target') }}
          restore-keys: maven-

      - name: Build and test Eclipse plugin
        working-directory: clients/eclipse
        run: xvfb-run mvn clean verify

      - name: Upload Eclipse update site
        uses: actions/upload-artifact@v4
        with:
          name: eclipse-updatesite
          path: clients/eclipse/au.csiro.ecl.eclipse.updatesite/target/*.zip

  package:
    runs-on: ubuntu-latest
    needs: [build-and-test, e2e-tests, intellij-plugin, eclipse-plugin, security, licenses]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download compiled output
        uses: actions/download-artifact@v4
        with:
          name: compiled-output

      # npm packages
      - name: Pack ecl-core
        working-directory: packages/ecl-core
        run: npm pack

      - name: Pack ecl-lsp-server
        working-directory: packages/ecl-lsp-server
        run: npm pack

      - name: Pack ecl-mcp-server
        working-directory: packages/ecl-mcp-server
        run: npm pack

      - name: Pack ecl-editor-core
        working-directory: packages/ecl-editor-core
        run: npm pack

      - name: Pack ecl-editor-react
        working-directory: packages/ecl-editor-react
        run: npm pack

      - name: Pack ecl-editor
        working-directory: packages/ecl-editor
        run: npm pack

      # VSCode extension
      - name: Build VSCode VSIX
        working-directory: clients/vscode
        run: npm run build:vsix

      - name: Collect npm tarballs
        run: |
          mkdir -p artifacts/npm-packages
          find packages/ -maxdepth 2 -name '*.tgz' -exec cp {} artifacts/npm-packages/ \;

      - name: Upload npm packages
        uses: actions/upload-artifact@v4
        with:
          name: npm-packages
          path: artifacts/npm-packages/

      - name: Upload VSCode extension
        uses: actions/upload-artifact@v4
        with:
          name: vscode-extension
          path: clients/vscode/*.vsix
