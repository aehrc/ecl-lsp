name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  # ── Validate ────────────────────────────────────────────────────────
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile
        run: npm run compile

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Check third-party licenses
        run: npm run licenses:check

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      # Upload compiled output for downstream jobs
      - name: Upload compiled output
        uses: actions/upload-artifact@v4
        with:
          name: compiled-output
          retention-days: 1
          path: |
            packages/ecl-core/src/parser/generated/
            packages/ecl-core/dist/
            packages/ecl-lsp-server/dist/
            packages/ecl-editor-core/dist/
            packages/ecl-editor-react/dist/
            packages/ecl-editor/dist/
            clients/vscode/dist/

    outputs:
      version: ${{ steps.version.outputs.version }}

  # ── npm publish ─────────────────────────────────────────────────────
  npm-publish:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - name: Download compiled output
        uses: actions/download-artifact@v4
        with:
          name: compiled-output

      - name: Publish npm packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for pkg in ecl-core ecl-lsp-server ecl-editor-core ecl-editor-react ecl-editor; do
            (cd packages/$pkg && npm publish --access public --provenance) || true
          done

      - name: Pack npm tarballs
        run: |
          mkdir -p release-artifacts
          for pkg in ecl-core ecl-lsp-server ecl-editor-core ecl-editor-react ecl-editor; do
            (cd packages/$pkg && npm pack --pack-destination ../../release-artifacts/)
          done

      - uses: actions/upload-artifact@v4
        with:
          name: npm-packages
          path: release-artifacts/

  # ── VSCode extension ────────────────────────────────────────────────
  vscode-extension:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Download compiled output
        uses: actions/download-artifact@v4
        with:
          name: compiled-output

      - name: Build VSIX
        working-directory: clients/vscode
        run: npm run build:vsix

      - uses: actions/upload-artifact@v4
        with:
          name: vscode-extension
          path: clients/vscode/*.vsix

  # ── IntelliJ plugin ─────────────────────────────────────────────────
  intellij-plugin:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Download compiled output
        uses: actions/download-artifact@v4
        with:
          name: compiled-output

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      - uses: gradle/actions/setup-gradle@v4

      - name: Build IntelliJ plugin
        working-directory: clients/intellij
        run: ./gradlew buildPlugin

      - uses: actions/upload-artifact@v4
        with:
          name: intellij-plugin
          path: clients/intellij/build/distributions/*.zip

  # ── Eclipse plugin ──────────────────────────────────────────────────
  eclipse-plugin:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Download compiled output
        uses: actions/download-artifact@v4
        with:
          name: compiled-output

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      - uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ hashFiles('clients/eclipse/**/pom.xml', 'clients/eclipse/**/*.target') }}
          restore-keys: maven-

      - name: Build Eclipse update site
        working-directory: clients/eclipse
        run: xvfb-run mvn clean verify -DskipTests

      - uses: actions/upload-artifact@v4
        with:
          name: eclipse-updatesite
          path: clients/eclipse/au.csiro.ecl.eclipse.updatesite/target/*.zip

  # ── Docker image ────────────────────────────────────────────────────
  docker-image:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ontoserver.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Slack bot Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/ecl-slack-bot/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ontoserver.azurecr.io/ecl-slack-bot:${{ needs.validate.outputs.version }}
            ontoserver.azurecr.io/ecl-slack-bot:latest

  # ── GitHub Release ──────────────────────────────────────────────────
  github-release:
    needs: [validate, npm-publish, vscode-extension, intellij-plugin, eclipse-plugin, docker-image]
    if: always() && needs.validate.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Collect release files
        run: |
          mkdir -p release-artifacts
          cp artifacts/npm-packages/* release-artifacts/ 2>/dev/null || true
          cp artifacts/vscode-extension/* release-artifacts/ 2>/dev/null || true
          cp artifacts/intellij-plugin/* release-artifacts/ 2>/dev/null || true
          cp artifacts/eclipse-updatesite/* release-artifacts/ 2>/dev/null || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-artifacts/*
