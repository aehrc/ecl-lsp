name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install dependencies
        run: npm ci

      - name: Compile
        run: npm run compile

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Check third-party licenses
        run: npm run licenses:check

      # ── Extract version from tag ──────────────────────────────────
      - name: Extract version
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"

      # ── npm packages ──────────────────────────────────────────────
      - name: Publish ecl-core to npm
        working-directory: packages/ecl-core
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish ecl-lsp-server to npm
        working-directory: packages/ecl-lsp-server
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish ecl-mcp-server to npm
        working-directory: packages/ecl-mcp-server
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish ecl-editor-core to npm
        working-directory: packages/ecl-editor-core
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish ecl-editor-react to npm
        working-directory: packages/ecl-editor-react
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish ecl-editor to npm
        working-directory: packages/ecl-editor
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # ── VSCode extension ──────────────────────────────────────────
      - name: Build VSCode VSIX
        working-directory: clients/vscode
        run: npm run build:vsix

      # ── IntelliJ plugin ──────────────────────────────────────────
      - name: Build IntelliJ plugin
        working-directory: clients/intellij
        run: ./gradlew buildPlugin

      # ── Eclipse update site ───────────────────────────────────────
      - name: Build Eclipse update site
        working-directory: clients/eclipse
        run: xvfb-run mvn clean verify -DskipTests

      # ── Collect artifacts ─────────────────────────────────────────
      - name: Collect release artifacts
        run: |
          mkdir -p release-artifacts
          cp clients/vscode/*.vsix release-artifacts/
          cp clients/intellij/build/distributions/*.zip release-artifacts/
          cp clients/eclipse/au.csiro.ecl.eclipse.updatesite/target/*.zip release-artifacts/ || true

      # ── GitHub Release ────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-artifacts/*
