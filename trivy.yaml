# Trivy license classification for Apache 2.0 compatibility.
# Copyleft licenses (GPL, AGPL) map to CRITICAL/HIGH and fail CI.
# See: https://aquasecurity.github.io/trivy/latest/docs/scanner/license/

license:
  # forbidden → CRITICAL severity
  forbidden:
    - AGPL-1.0
    - AGPL-1.0-only
    - AGPL-1.0-or-later
    - AGPL-3.0
    - AGPL-3.0-only
    - AGPL-3.0-or-later
    - SSPL-1.0
    - EUPL-1.0
    - EUPL-1.1
    - EUPL-1.2
    - CC-BY-NC-1.0
    - CC-BY-NC-2.0
    - CC-BY-NC-2.5
    - CC-BY-NC-3.0
    - CC-BY-NC-4.0
    - CC-BY-NC-SA-1.0
    - CC-BY-NC-SA-2.0
    - CC-BY-NC-SA-2.5
    - CC-BY-NC-SA-3.0
    - CC-BY-NC-SA-4.0
    - CC-BY-NC-ND-1.0
    - CC-BY-NC-ND-2.0
    - CC-BY-NC-ND-2.5
    - CC-BY-NC-ND-3.0
    - CC-BY-NC-ND-4.0

  # restricted → HIGH severity
  restricted:
    - GPL-2.0
    - GPL-2.0-only
    - GPL-2.0-or-later
    - GPL-3.0
    - GPL-3.0-only
    - GPL-3.0-or-later
    - LGPL-2.0
    - LGPL-2.0-only
    - LGPL-2.0-or-later
    - LGPL-2.1
    - LGPL-2.1-only
    - LGPL-2.1-or-later
    - LGPL-3.0
    - LGPL-3.0-only
    - LGPL-3.0-or-later
    - CC-BY-SA-1.0
    - CC-BY-SA-2.0
    - CC-BY-SA-2.5
    - CC-BY-SA-3.0
    - CC-BY-SA-4.0
    - MPL-2.0

  # notice → LOW severity
  notice:
    - Apache-2.0
    - Artistic-2.0
    - CC-BY-1.0
    - CC-BY-2.0
    - CC-BY-2.5
    - CC-BY-3.0
    - CC-BY-4.0

  # permissive → LOW severity
  permissive:
    - MIT
    - ISC
    - BSD-2-Clause
    - BSD-3-Clause
    - 0BSD
    - BlueOak-1.0.0
    - Zlib
    - PSF-2.0
    - Python-2.0
    - X11

  # unencumbered → LOW severity
  unencumbered:
    - CC0-1.0
    - Unlicense
    - WTFPL
